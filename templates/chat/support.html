{% extends "base.html" %}
{% block title %}Support Chat{% endblock %}

{% block content %}
<div class="container py-4">
  <h1 class="mb-3"><i class="fas fa-comments"></i> Customer Support</h1>
  <div class="card">
    <div class="card-body">
      <p class="mb-3">Subject: {{ room.subject if room else 'Support Request' }}</p>
      {% if room %}
        <a class="btn btn-primary" href="{{ url_for('chat.view_room', room_id=room.id) }}">
          Open chat
        </a>
      {% else %}
        <p class="text-muted mb-0">No chat room available.</p>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
