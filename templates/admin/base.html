{% extends "base.html" %}

{% block extra_css %}
{% endblock %}

{% block content %}
<style>
/* Admin Dashboard Styles */
:root {
    --brown-dark: #4E342E;
    --brown-primary: #6D4C41;
    --brown-light: #D7CCC8;
    --tan: #EBD5B3;
    --white: #FFFFFF;
    --beige-bg: #FAF3E0;
}

/* FORCE SIDEBAR VISIBILITY */
.sidebar {
    display: block !important;
    visibility: visible !important;
    opacity: 1 !important;
    position: fixed !important;
    left: 0 !important;
    top: 56px !important;
    width: 250px !important;
    height: calc(100vh - 56px) !important;
    z-index: 1020 !important;
    background: var(--brown-dark) !important;
    color: white !important;
    padding: 20px 15px !important;
    overflow-y: auto !important;
    transition: all 0.3s ease !important;
}

.sidebar.collapsed {
    width: 70px !important;
    padding: 20px 10px !important;
}

.sidebar.collapsed .sidebar-header h3,
.sidebar.collapsed .sidebar-header img {
    display: none !important;
}

.sidebar.collapsed .sidebar-nav a {
    justify-content: center !important;
    padding: 12px 10px !important;
}

.sidebar.collapsed .sidebar-nav a span {
    display: none !important;
}

.sidebar.collapsed .sidebar-nav i {
    margin-right: 0 !important;
    font-size: 1.1rem !important;
}

/* Sidebar header styling */
.sidebar .sidebar-header {
    text-align: center;
    margin-bottom: 25px;
    padding-bottom: 15px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
}

.sidebar .sidebar-header h3 {
    color: white !important;
    font-size: 1.3rem;
    margin: 8px 0 5px 0;
    font-weight: 600;
}

/* Sidebar navigation */
.sidebar .sidebar-nav {
    list-style: none !important;
    padding: 0 !important;
    margin: 0 !important;
}

.sidebar .sidebar-nav li {
    margin-bottom: 5px !important;
}

.sidebar .sidebar-nav a {
    display: flex !important;
    align-items: center !important;
    padding: 10px 12px !important;
    color: rgba(255, 255, 255, 0.85) !important;
    text-decoration: none !important;
    border-radius: 6px !important;
    transition: all 0.3s ease !important;
    font-weight: 500 !important;
    font-size: 0.9rem !important;
}

.sidebar .sidebar-nav a:hover,
.sidebar .sidebar-nav a.active {
    background-color: rgba(255, 255, 255, 0.15) !important;
    color: white !important;
    transform: translateX(5px) !important;
}

.sidebar .sidebar-nav i {
    margin-right: 10px !important;
    width: 18px !important;
    text-align: center !important;
    font-size: 0.95rem !important;
}

/* Scrollbar styling for sidebar */
.sidebar::-webkit-scrollbar {
    width: 6px;
}

.sidebar::-webkit-scrollbar-track {
    background: rgba(0, 0, 0, 0.1);
}

.sidebar::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.3);
    border-radius: 3px;
}

.sidebar::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.5);
}

/* Dashboard Layout */
.dashboard-layout {
    display: flex;
    min-height: 100vh;
    padding-top: 0;
}

/* Main content positioning */
.main-content {
    margin-left: 250px !important;
    margin-top: 56px !important;
    flex: 1;
    padding: 25px 30px;
    background-color: var(--beige-bg) ;
    min-height: calc(100vh - 56px);
    transition: margin-left 0.3s ease;
}

.main-content.expanded {
    margin-left: 70px !important;
}

/* Sidebar Toggle Button in Navbar */
.sidebar-toggle-btn {
    background: transparent;
    border: none;
    color: #8B4513;
    font-size: 1.3rem;
    padding: 0;
    width: 50px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
    position: fixed;
    left: 0;
    top: 0;
    z-index: 1050;
}

.sidebar-toggle-btn:hover {
    color: #5D4037;
    background: rgba(139, 69, 19, 0.1);
}

.sidebar-toggle-btn i {
    transition: transform 0.3s ease;
}

/* Adjust navbar for hamburger at left edge */
.navbar .container {
    padding-left: 60px;
}

/* Dashboard header */
.dashboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    padding-bottom: 20px;
    border-bottom: 2px solid #e9ecef;
}

.dashboard-header h1 {
    font-size: 2rem;
    font-weight: 700;
    color: var(--brown-dark);
    margin: 0;
}

.header-actions {
    display: flex;
    gap: 10px;
}

/* Stats Grid */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
    margin-bottom: 25px;
}

.stat-card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    display: flex;
    align-items: center;
    gap: 15px;
    transition: transform 0.2s;
}

.stat-card:hover {
    transform: translateY(-5px);
}

.stat-icon {
    width: 60px;
    height: 60px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    color: white;
}

.stat-card.primary .stat-icon {
    background: var(--brown-dark);
}

.stat-card.success .stat-icon {
    background: var(--brown-dark);
}

.stat-card.warning .stat-icon {
    background: var(--brown-dark);
}

.stat-card.info .stat-icon {
    background: var(--brown-dark);
}

.stat-value {
    font-size: 2rem;
    font-weight: 700;
    color: #2d3748;
    margin: 0;
}

.stat-label {
    font-size: 0.9rem;
    color: #718096;
    margin: 0;
}

/* Content Grid */
.content-grid {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 20px;
    margin-bottom: 25px;
}

/* Sections */
.quick-actions,
.recent-activity,
.system-status {
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    margin-bottom: 20px;
}

.quick-actions h3,
.recent-activity h3,
.system-status h4 {
    font-size: 1.2rem;
    font-weight: 700;
    color: #2d3748;
    margin-bottom: 20px;
}

/* Action Buttons */
.action-buttons {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
}

.action-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    background: var(--brown-dark);
    color: white;
    text-decoration: none;
    border-radius: 8px;
    transition: all 0.3s;
    font-weight: 500;
    border: none;
    cursor: pointer;
}

.action-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(139, 69, 19, 0.3);
    color: white;
}

/* Activity List */
.activity-list {
    list-style: none;
    padding: 0;
    margin: 0;
}

.activity-item {
    display: flex;
    gap: 15px;
    padding: 15px 0;
    border-bottom: 1px solid #e9ecef;
}

.activity-item:last-child {
    border-bottom: none;
}

.activity-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #f8f9fa;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #8B4513;
}

.activity-content .title {
    font-weight: 600;
    color: #2d3748;
    margin-bottom: 5px;
}

.activity-content .meta {
    font-size: 0.85rem;
    color: var(--brown-primary);
}

/* System Status */
.status-item {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #e9ecef;
}

.status-item:last-child {
    border-bottom: none;
}

.status-label {
    font-weight: 500;
    color: #4a5568;
}

.status-value {
    font-weight: 600;
    color: #2d3748;
}

.status-indicator {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #48bb78;
    margin-left: 8px;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

/* Admin Footer */
.admin-footer {
    text-align: center;
    padding: 20px;
    color: var(--brown-dark);
    border-top: 1px solid #e9ecef;
    margin-top: 30px;
}

/* Hide back button in admin dashboard */
.back-fab {
    display: none !important;
}

/* Responsive adjustments */
@media (max-width: 992px) {
    .sidebar {
        transform: translateX(-100%) !important;
    }
    
    .sidebar.show {
        transform: translateX(0) !important;
        z-index: 1100 !important;
    }
    
    .main-content {
        margin-left: 0 !important;
    }
    
    .content-grid {
        grid-template-columns: 1fr;
    }
}
</style>

<!-- Chart.js Library -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<div class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="adminSidebar">
        <div class="sidebar-header">
            <img src="{{ url_for('static', filename='2.png') }}" alt="Pawfect Finds" style="width: 50px; height: 50px; border-radius: 50%; margin-bottom: 10px;">
            <h3>Admin</h3>
        </div>
        <nav>
            <ul class="sidebar-nav">
            <li><a href="{{ url_for('admin.dashboard') }}" class="{% if request.endpoint == 'admin.dashboard' %}active{% endif %}" title="Dashboard"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a></li>
                <li><a href="{{ url_for('admin.manage_users') }}" class="{% if request.endpoint == 'admin.manage_users' %}active{% endif %}" title="Users"><i class="fas fa-users"></i> <span>Users</span></a></li>
                <li><a href="{{ url_for('admin.seller_requests') }}" class="{% if request.endpoint == 'admin.seller_requests' %}active{% endif %}" title="Seller Requests"><i class="fas fa-handshake"></i> <span>Seller Requests</span></a></li>
                <li><a href="{{ url_for('admin.rider_requests') }}" class="{% if request.endpoint == 'admin.rider_requests' %}active{% endif %}" title="Rider Requests"><i class="fas fa-motorcycle"></i> <span>Rider Requests</span></a></li>
                <li><a href="{{ url_for('admin.manage_products') }}" class="{% if request.endpoint == 'admin.manage_products' %}active{% endif %}" title="Products"><i class="fas fa-box"></i> <span>Products</span></a></li>
                <li><a href="{{ url_for('admin.manage_orders') }}" class="{% if request.endpoint == 'admin.manage_orders' %}active{% endif %}" title="Orders"><i class="fas fa-shopping-cart"></i> <span>Orders</span></a></li>
                <li><a href="{{ url_for('admin.analytics') }}" class="{% if request.endpoint == 'admin.analytics' %}active{% endif %}" title="Analytics"><i class="fas fa-chart-bar"></i> <span>Analytics</span></a></li>
                <li><a href="{{ url_for('admin.audit_logs') }}" class="{% if request.endpoint == 'admin.audit_logs' %}active{% endif %}" title="Audit Logs"><i class="fas fa-clipboard-list"></i> <span>Audit Logs</span></a></li>
                <li><a href="{{ url_for('chat.admin_messages') }}" class="{% if request.endpoint == 'chat.admin_messages' %}active{% endif %}" title="Messages"><i class="fas fa-comments"></i> <span>Messages</span></a></li>
                <li><a href="{{ url_for('admin.rider_payouts') }}" class="{% if request.endpoint == 'admin.rider_payouts' %}active{% endif %}" title="Rider Payouts"><i class="fas fa-money-bill-wave"></i> <span>Payouts</span></a></li>
                <li><a href="{{ url_for('admin.system_settings') }}" class="{% if 'system_settings' in request.endpoint %}active{% endif %}" title="System Settings"><i class="fas fa-cogs"></i> <span>Settings</span></a></li>
            </ul>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        {% block admin_content %}{% endblock %}
    </main>
</div>


<!-- Sidebar Toggle Script -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Create and insert hamburger button in navbar
    const navbar = document.querySelector('.navbar .container');
    if (navbar) {
        const toggleBtn = document.createElement('button');
        toggleBtn.id = 'sidebarToggleBtn';
        toggleBtn.className = 'sidebar-toggle-btn';
        toggleBtn.title = 'Toggle Sidebar';
        toggleBtn.innerHTML = '<i class="fas fa-bars"></i>';
        
        // Insert at the beginning of navbar container
        navbar.insertBefore(toggleBtn, navbar.firstChild);
    }
    
    const sidebar = document.getElementById('adminSidebar');
    const mainContent = document.getElementById('mainContent');
    const toggleButton = document.getElementById('sidebarToggleBtn');
    
    // Load saved state from localStorage
    const isCollapsed = localStorage.getItem('adminSidebarCollapsed') === 'true';
    if (isCollapsed) {
        sidebar.classList.add('collapsed');
        mainContent.classList.add('expanded');
    }
    
    // Toggle sidebar on button click
    if (toggleButton) {
        toggleButton.addEventListener('click', function(e) {
            e.preventDefault();
            sidebar.classList.toggle('collapsed');
            mainContent.classList.toggle('expanded');
            
            // Save state to localStorage
            const collapsed = sidebar.classList.contains('collapsed');
            localStorage.setItem('adminSidebarCollapsed', collapsed);
            
            // Rotate icon slightly for visual feedback
            const icon = toggleButton.querySelector('i');
            icon.style.transform = collapsed ? 'rotate(90deg)' : 'rotate(0deg)';
        });
    }
});
</script>

{% endblock %}
